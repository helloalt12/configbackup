[main]
font=JetBrainsMono Nerd Font:size=10
prompt=
anchor=top-left
x-margin=16
y-margin=16
width=22
lines=6
hide-prompt=yes
horizontal-pad=18
vertical-pad=14
inner-pad=8
layer=top
keyboard-focus=on-demand
exit-on-keyboard-focus-loss=yes
enable-mouse=yes
match-mode=fzf
sort-result=no

[colors]
background=2e3440ff
text=d8dee9ff
prompt=d8dee9ff
placeholder=4c566aff
input=eceff4ff
match=81a1c1ff
selection=434c5eff
selection-text=eceff4ff
selection-match=88c0d0ff
border=4c566aff

[border]
width=1
radius=16
selection-radius=10

[dmenu]
mode=text
exit-immediately-if-empty=no
