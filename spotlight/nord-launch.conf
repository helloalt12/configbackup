# ╔══════════════════════════════════════════════════════════╗
# ║  nord-launch — Hyprland window rules & keybind          ║
# ╚══════════════════════════════════════════════════════════╝
# Source this from your hyprland.conf or rules.conf:
#   source = ~/.config/hypr/conf/nord-launch.conf

# ── Window rules ─────────────────────────────────────────────────────────────
windowrule = float,    class:^(dev.rmustard.nordlaunch)$
windowrule = center,   class:^(dev.rmustard.nordlaunch)$
windowrule = size 660 520, class:^(dev.rmustard.nordlaunch)$
windowrule = noborder, class:^(dev.rmustard.nordlaunch)$
windowrule = noshadow, class:^(dev.rmustard.nordlaunch)$
windowrule = noanim,   class:^(dev.rmustard.nordlaunch)$

# ── Keybind ───────────────────────────────────────────────────────────────────
# SUPER + SPACE  → open / close launcher (toggle)
bind = SUPER, SPACE, exec, ~/.config/nord-launch/nord-launch
