# ──────────────────────────────────────────
#  GENERAL
# ──────────────────────────────────────────
general {
    disable_loading_bar    = false
    hide_cursor            = true
    grace                  = 0
    no_fade_in             = false
    no_fade_out            = false
    ignore_empty_input     = true
    text_trim              = true
}

# ──────────────────────────────────────────
#  BACKGROUND
# ──────────────────────────────────────────
background {
    monitor     =
    path        = screenshot

    blur_passes = 3
    blur_size   = 7
    brightness  = 0.55
    contrast    = 1.0
    vibrancy    = 0.15
    noise       = 0.0117
}

# ──────────────────────────────────────────
#  JAM  ─  HOURS (putih, baris atas)
# ──────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "<b>$(date +"%H")</b>"
    font_size   = 130
    font_family = Montserrat ExtraBold

    color       = rgba(ffffffff)

    position    = 0, 90
    halign      = center
    valign      = center

    shadow_passes = 3
    shadow_size   = 8
    shadow_color  = rgba(00000088)
    shadow_boost  = 1.3
}

# ──────────────────────────────────────────
#  JAM  ─  MINUTES (biru steel, baris bawah)
# ──────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "<b>$(date +"%M")</b>"
    font_size   = 130
    font_family = Montserrat ExtraBold

    color       = rgba(7aafd4ff)

    position    = 0, -50
    halign      = center
    valign      = center

    shadow_passes = 2
    shadow_size   = 6
    shadow_color  = rgba(00000077)
    shadow_boost  = 1.1
}

# ──────────────────────────────────────────
#  TANGGAL  (di bawah menit)
# ──────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +"%-d %B, %a.")"
    font_size   = 17
    font_family = Montserrat Medium

    color       = rgba(8ab4cca0)

    position    = 0, -195
    halign      = center
    valign      = center

    shadow_passes = 1
    shadow_size   = 3
    shadow_color  = rgba(00000055)
}

# ──────────────────────────────────────────
#  INPUT PASSWORD
# ──────────────────────────────────────────
input-field {
    monitor     =
    size        = 340, 58
    position    = 0, -300
    halign      = center
    valign      = center

    outline_thickness      = 1
    dots_size              = 0.25
    dots_spacing           = 0.30
    dots_center            = true
    dots_rounding          = -1

    outer_color            = rgba(7aafd430)
    inner_color            = rgba(ffffff08)
    font_color             = rgba(ffffffff)
    font_family            = Montserrat Medium
    check_color            = rgba(7aafd4ff)

    fail_color             = rgba(f38ba8cc)
    fail_text              = <span font_family="Montserrat Medium"><i>󰀅  Auth failed</i></span>
    fail_transition        = 300

    placeholder_text       = <span font_family="Montserrat Medium" foreground="##5a6a7a">󰌾  Enter Password</span>
    hide_input             = false

    rounding               = 28
    fade_on_empty          = false
    fade_timeout           = 0

    capslock_color         = rgba(fab387cc)
    numlock_color          = -1

    shadow_passes          = 3
    shadow_size            = 10
    shadow_color           = rgba(7aafd41a)
    shadow_boost           = 1.2
}

# ──────────────────────────────────────────
#  LABEL "Locked"
# ──────────────────────────────────────────
label {
    monitor     =
    text        = 󰍁  LOCKED
    font_size   = 11
    font_family = Montserrat SemiBold

    color       = rgba(7aafd466)

    position    = 0, -260
    halign      = center
    valign      = center
}

# ──────────────────────────────────────────
#  USERNAME (kiri bawah)
# ──────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:0] echo "  $USER"
    font_size   = 13
    font_family = Montserrat Medium

    color       = rgba(8ab4cc99)

    position    = 30, -30
    halign      = left
    valign      = bottom
}

# ──────────────────────────────────────────
#  UPTIME (kanan bawah)
# ──────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:60000] echo "󰥔  $(uptime -p | sed 's/up //')"
    font_size   = 13
    font_family = Montserrat Medium

    color       = rgba(8ab4cc99)

    position    = -30, -30
    halign      = right
    valign      = bottom
}
