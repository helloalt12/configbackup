include ~/.config/kitty/current-theme.conf

allow_remote_control yes
listen_on unix:/tmp/kitty
allow_remote_control yes

# ── Font ────────────────────────────────────────────────────
font_family             JetBrainsMono Nerd Font
bold_font               JetBrainsMono Nerd Font Bold
italic_font             JetBrainsMono Nerd Font Italic
bold_italic_font        JetBrainsMono Nerd Font Bold Italic
font_size               13.5

# ── Force Close ─────────────────────────────────────────────
confirm_os_window_close 0

# Fine-tune rendering
adjust_line_height      110%
adjust_column_width     0
text_composition_strategy   platform

# ── Cursor ──────────────────────────────────────────────────
cursor_shape                beam
cursor_beam_thickness       1.8
cursor_blink_interval       0.5
cursor_stop_blinking_after  10
cursor_animate              yes

# ── Scrollback ──────────────────────────────────────────────
scrollback_lines            10000
wheel_scroll_lines          5
scrollback_pager            less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# ── Window ──────────────────────────────────────────────────
remember_window_size        no
initial_window_width        220c
initial_window_height       50c
window_padding_width        16
window_padding_height       10
hide_window_decorations     yes
resize_in_steps             yes

# ── Transparency & Background ────────────────────────────────
background_opacity          0.88
dynamic_background_opacity  no
dim_opacity                 0.6

# Blur hint for Hyprland (set blur in hyprland.conf windowrule)
# windowrulev2 = opacity 0.88 0.80, class:^(kitty)$
# windowrulev2 = blur, class:^(kitty)$

# ── Tab Bar ──────────────────────────────────────────────────
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          " {index}: {title} "
active_tab_font_style       bold
inactive_tab_font_style     normal
tab_bar_margin_height       2 0
tab_bar_min_tabs            2

# ── Bell ─────────────────────────────────────────────────────
enable_audio_bell           no
visual_bell_duration        0.0

# ── Performance ──────────────────────────────────────────────
sync_to_monitor             yes
repaint_delay               8
input_delay                 2

# ── Keyboard shortcuts ───────────────────────────────────────
kitty_mod                   ctrl+shift

map kitty_mod+t             new_tab_with_cwd
map kitty_mod+w             close_tab
map kitty_mod+]             next_tab
map kitty_mod+[             previous_tab
map kitty_mod+enter         new_window_with_cwd
map kitty_mod+equal         increase_font_size
map kitty_mod+minus         decrease_font_size
map kitty_mod+0             restore_font_size
map kitty_mod+f5            load_config_file
map kitty_mod+u             scroll_page_up
map kitty_mod+d             scroll_page_down
map kitty_mod+k             scroll_line_up
map kitty_mod+j             scroll_line_down

# Copy / paste (Wayland-native)
map kitty_mod+c             copy_to_clipboard
map kitty_mod+v             paste_from_clipboard

# ── Selection ────────────────────────────────────────────────
selection_foreground        none
selection_background        #1e4a5a
copy_on_select              yes
strip_trailing_spaces       smart
select_by_word_characters   @-./_~?&=%+#

# ── URL handling ─────────────────────────────────────────────
open_url_with               default
detect_urls                 yes
url_style                   curly

# ── Mouse ────────────────────────────────────────────────────
mouse_hide_wait             3.0
focus_follows_mouse         no
pointer_shape_when_grabbed  arrow
default_pointer_shape       beam

# ── Colors ───────────────────────────────────────────────────
include colors-matugen.conf

# ── Cursor trail (optional) ──────────────────────────────────
include $HOME/.config/kitty/kitty-cursor-trail.conf
